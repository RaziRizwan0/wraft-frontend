name: Docker Build and Push (Multi-Arch)

on:
  push:
    branches: [ main ]

env:
  REGISTRY: quay.io
  IMAGE_NAME: frontend
  VERSION: 1.0.0 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Enable cross-platform emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Configure multi-arch builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64  

      # 3. Login to registry
      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: razirizwan
          password: ${{ secrets.QUAY_PASSWORD }}

      # 4. Build and push (single multi-arch tag)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/razirizwan/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/razirizwan/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/razirizwan/${{ env.IMAGE_NAME }}:${{ github.sha }}


